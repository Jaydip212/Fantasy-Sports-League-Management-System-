<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | CricFantasy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
    <style>
        .profile-header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(to bottom, rgba(30, 41, 59, 0.8), rgba(15, 23, 42, 0.9));
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
        }

        .avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            font-family: 'Outfit';
            font-weight: 800;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-family: 'Outfit';
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container animate-fade-in" style="max-width: 800px; padding-top: 30px;">
        <h2 style="margin-bottom: 24px;">My Profile</h2>

        <div class="profile-header">
            <div class="avatar" id="avatar-initial">U</div>
            <h3 id="profile-name" style="font-size: 1.8rem;">Loading...</h3>
            <p id="profile-phone" style="color: var(--text-secondary); margin-top: 5px;">+91 0000000000</p>
        </div>

        <h3 style="margin-bottom: 16px;">Lifetime Statistics</h3>
        <div class="stat-grid">
            <div class="stat-card">
                <div class="stat-value" id="stat-matches">0</div>
                <div class="stat-label">Contests Joined</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" style="color: #10b981;" id="stat-winnings">₹0</div>
                <div class="stat-label">Total Winnings</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-points">0</div>
                <div class="stat-label">Total Points</div>
            </div>
        </div>

        <div style="text-align: center; margin-top: 40px;">
            <button class="btn btn-outline" style="border-color: var(--accent-danger); color: var(--accent-danger);" onclick="resetSystem()">Danger: Reset My Account</button>
        </div>
    </div>

    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        requireAuth();
        renderNavbar();

        function loadProfile() {
            let user = getCurrentUser();
            document.getElementById('profile-name').innerText = user.name;
            document.getElementById('profile-phone').innerText = user.phone;
            document.getElementById('avatar-initial').innerText = user.name.charAt(0).toUpperCase();

            // Calculate stats
            let joined = getJoinedContests().filter(c => c.userId === user.id);
            let teams = getUserTeams().filter(t => t.userId === user.id);
            let txs = getTransactions().filter(t => t.userId === user.id && t.desc.includes('Winnings'));

            document.getElementById('stat-matches').innerText = joined.length;
            
            let totalWinnings = txs.reduce((sum, t) => sum + parseInt(t.amount), 0);
            document.getElementById('stat-winnings').innerText = `₹${totalWinnings}`;

            let totalPts = teams.reduce((sum, t) => sum + (t.totalPoints || 0), 0);
            document.getElementById('stat-points').innerText = totalPts;
        }

        function resetSystem() {
            if(confirm("Wait! This will delete ALL your mock transactions, teams, and wallets for everyone! Continue?")) {
                localStorage.clear();
                window.location.href = 'index.html';
            }
        }

        loadProfile();
    </script>
</body>
</html>
