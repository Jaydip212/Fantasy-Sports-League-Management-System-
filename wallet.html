<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wallet | CricFantasy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
    <style>
        .wallet-container {
            max-width: 600px;
            margin: 40px auto;
        }
        
        .balance-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8), rgba(15, 23, 42, 0.9));
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
        }

        .balance-amount {
            font-size: 3rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            color: var(--text-primary);
            margin: 10px 0;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
        }

        .chip-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        .amt-chip {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .amt-chip:hover {
            background: rgba(0, 242, 254, 0.2);
            border-color: var(--accent-primary);
        }

        .add-funds-box {
            background: var(--bg-surface);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .amt-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.2rem;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .amt-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 2px rgba(0, 242, 254, 0.2);
        }

        .transaction-list {
            margin-top: 30px;
        }

        .tx-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            margin-bottom: 10px;
        }
        
        .tx-item.credit .tx-amt { color: #10b981; }
        .tx-item.debit .tx-amt { color: #f43f5e; }

        /* Payment Loader Overlay */
        #payment-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.95);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        
        #payment-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(0, 242, 254, 0.2);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .success-check {
            display: none;
            width: 60px;
            height: 60px;
            background: #10b981;
            border-radius: 50%;
            text-align: center;
            line-height: 60px;
            font-size: 30px;
            color: white;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container wallet-container animate-fade-in">
        <h2 style="margin-bottom: 24px;">My Wallet</h2>

        <div class="balance-card">
            <div style="color: var(--text-secondary); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;">Total Balance</div>
            <div class="balance-amount" id="display-balance">₹0</div>
            <div style="color: var(--text-secondary); font-size: 0.85rem;">1 Coin = ₹1 Demo Rupee</div>
        </div>

        <div class="add-funds-box glass-card">
            <h3 style="margin-bottom: 16px;">Add Funds</h3>
            <div class="chip-container">
                <div class="amt-chip" onclick="setAmount(100)">+ ₹100</div>
                <div class="amt-chip" onclick="setAmount(500)">+ ₹500</div>
                <div class="amt-chip" onclick="setAmount(1000)">+ ₹1000</div>
                <div class="amt-chip" onclick="setAmount(2000)">+ ₹2000</div>
            </div>
            
            <input type="number" id="recharge-amount" class="amt-input" placeholder="Enter Amount (e.g. 500)">
            <button class="btn btn-primary" style="width: 100%; font-size: 1.1rem; padding: 14px;" onclick="processPayment()">Proceed to Pay</button>
        </div>

        <div class="transaction-list">
            <h3 style="margin-bottom: 16px;">Recent Transactions</h3>
            <div id="tx-container">
                <!-- Transactions loaded here -->
            </div>
        </div>
    </div>

    <!-- Mock Payment Gateway -->
    <div id="payment-overlay">
        <div class="spinner" id="pay-spinner"></div>
        <div class="success-check" id="pay-success">✓</div>
        <h2 id="pay-status">Processing Payment...</h2>
        <p style="color: var(--text-secondary); margin-top: 10px;">Please do not close this window</p>
    </div>

    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        requireAuth();
        renderNavbar();

        function loadWalletData() {
            let user = getCurrentUser();
            document.getElementById('display-balance').innerText = `₹${user.walletBalance}`;

            let allTx = getTransactions();
            let myTx = allTx.filter(t => t.userId === user.id).reverse();
            let txContainer = document.getElementById('tx-container');
            
            if (myTx.length === 0) {
                txContainer.innerHTML = `<div style="text-align:center; color: var(--text-secondary); padding: 20px;">No transactions yet.</div>`;
                return;
            }

            txContainer.innerHTML = myTx.map(tx => `
                <div class="tx-item ${tx.type}">
                    <div>
                        <div style="font-weight: 600;">${tx.desc}</div>
                        <div style="font-size: 0.8rem; color: var(--text-secondary);">${new Date(tx.date).toLocaleString()}</div>
                    </div>
                    <div class="tx-amt" style="font-weight: bold; font-family: 'Outfit';">
                        ${tx.type === 'credit' ? '+' : '-'}₹${tx.amount}
                    </div>
                </div>
            `).join('');
        }

        function setAmount(val) {
            document.getElementById('recharge-amount').value = val;
        }

        function processPayment() {
            let amt = parseInt(document.getElementById('recharge-amount').value);
            if (!amt || amt <= 0) {
                alert("Please enter a valid amount.");
                return;
            }

            // Show UI Loading
            const overlay = document.getElementById('payment-overlay');
            const spinner = document.getElementById('pay-spinner');
            const success = document.getElementById('pay-success');
            const status = document.getElementById('pay-status');
            
            overlay.classList.add('active');
            spinner.style.display = 'block';
            success.style.display = 'none';
            status.innerText = "Processing Payment via Mock Gateway...";

            setTimeout(() => {
                // Payment Success UI Simulation
                spinner.style.display = 'none';
                success.style.display = 'block';
                status.innerText = "Payment Successful!";
                status.style.color = "#10b981";

                // Actually update DB
                let user = getCurrentUser();
                let users = JSON.parse(localStorage.getItem('users')) || [];
                user.walletBalance += amt;
                
                let userIndex = users.findIndex(u => u.id === user.id);
                if (userIndex !== -1) {
                    users[userIndex] = user;
                    localStorage.setItem('users', JSON.stringify(users));
                }
                localStorage.setItem('currentUser', JSON.stringify(user));

                // Add Transaction
                let txList = getTransactions();
                txList.push({
                    id: Date.now(),
                    userId: user.id,
                    type: 'credit',
                    amount: amt,
                    desc: 'Added via Mock Gateway',
                    date: new Date().toISOString()
                });
                localStorage.setItem('transactions', JSON.stringify(txList));

                setTimeout(() => {
                    overlay.classList.remove('active');
                    status.style.color = "white"; // reset
                    document.getElementById('recharge-amount').value = '';
                    updateWalletUI(); // app.js helper
                    loadWalletData();
                }, 1500);

            }, 2000);
        }

        // initial load
        loadWalletData();
    </script>
</body>
</html>
