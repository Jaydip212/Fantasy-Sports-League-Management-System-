<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | CricFantasy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
    <style>
        .admin-stat {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(0, 242, 254, 0.2);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            overflow: hidden;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        th {
            background: rgba(255,255,255,0.05);
            color: var(--text-secondary);
            font-weight: 500;
        }

        .sim-btn {
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
            border: none;
        }
        .sim-btn:hover {
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.6);
        }
    </style>
</head>
<body>

    <div class="container animate-fade-in" style="padding-top: 40px; max-width: 800px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <h2>System Administration</h2>
            <a href="dashboard.html" class="btn btn-outline" style="padding: 8px 16px;">Exit Admin</a>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
            <div class="admin-stat">
                <div style="font-size: 2rem; font-weight: bold; font-family: 'Outfit';" id="st-users">0</div>
                <div style="color: var(--text-secondary); font-size: 0.85rem;">Registered Users</div>
            </div>
            <div class="admin-stat">
                <div style="font-size: 2rem; font-weight: bold; font-family: 'Outfit';" id="st-teams">0</div>
                <div style="color: var(--text-secondary); font-size: 0.85rem;">Teams Created</div>
            </div>
        </div>

        <div class="glass-card" style="margin-bottom: 24px;">
            <h3 style="margin-bottom: 8px; color: #a78bfa;">Match Simulation Engine</h3>
            <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 16px;">
                Randomly generate points for all active user teams, finish live contests, and distribute mock prize money to winners!
            </p>
            <button class="btn sim-btn" onclick="simulateAllMatches()" style="width: 100%; font-size: 1.1rem; padding: 14px;">Simulate Contests & Declare Results</button>
        </div>

        <div class="glass-card" style="margin-bottom: 24px;">
            <h3 style="margin-bottom: 16px;">User Directory</h3>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Phone</th>
                            <th>Name</th>
                            <th>Wallet Balance</th>
                        </tr>
                    </thead>
                    <tbody id="user-table-body">
                        <!-- Users go here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        requireAuth();
        
        let currentUser = getCurrentUser();
        // Role-Based Access Control
        if (currentUser.phone !== '9999999999') {
            alert("ACCESS DENIED: Administrator Privileges Required!");
            window.location.href = 'dashboard.html';
        }

        function loadAdminData() {
            let users = JSON.parse(localStorage.getItem('users')) || [];
            let teams = getUserTeams();
            
            document.getElementById('st-users').innerText = users.length;
            document.getElementById('st-teams').innerText = teams.length;

            let tbody = '';
            users.forEach(u => {
                tbody += `
                    <tr>
                        <td>${u.phone}</td>
                        <td>${u.name}</td>
                        <td style="font-weight: bold; color: #10b981;">₹${u.walletBalance}</td>
                    </tr>
                `;
            });
            document.getElementById('user-table-body').innerHTML = tbody || '<tr><td colspan="3" style="text-align:center;">No users found</td></tr>';
        }

        // The Magic Demo Function
        function simulateAllMatches() {
            if(!confirm("Start mass simulation? This will generate random points for all user teams and distribute Winnings.")) return;

            let teams = getUserTeams();
            let joined = getJoinedContests();
            let users = JSON.parse(localStorage.getItem('users')) || [];
            let txList = getTransactions();

            let changesMade = false;

            // Generate Points for Teams
            teams.forEach(team => {
                if (!team.totalPoints) {
                    team.totalPoints = Math.floor(Math.random() * 500) + 250; // Random score 250 - 750
                    changesMade = true;
                }
            });

            // Evaluate Contests & Distribute Prizes
            joined.forEach(j => {
                if (!j.isComputed) {
                    let team = teams.find(t => t.id === j.teamId);
                    if (team && team.totalPoints) {
                        // Demo Logic: if they score over 500, they win "MEGA PRIZE"
                        if (team.totalPoints > 550) {
                            let winAmt = 1500; // Big win
                            
                            // Deposit to user wallet
                            let uIdx = users.findIndex(u => u.id === j.userId);
                            if(uIdx > -1) {
                                users[uIdx].walletBalance += winAmt;
                                
                                txList.push({
                                    id: Date.now(),
                                    userId: users[uIdx].id,
                                    type: 'credit',
                                    amount: winAmt,
                                    desc: `Winnings: Match ${j.matchId}`,
                                    date: new Date().toISOString()
                                });
                            }
                        } else if (team.totalPoints > 400) {
                             let winAmt = 200; // Small win
                             let uIdx = users.findIndex(u => u.id === j.userId);
                            if(uIdx > -1) {
                                users[uIdx].walletBalance += winAmt;
                                
                                txList.push({
                                    id: Date.now(),
                                    userId: users[uIdx].id,
                                    type: 'credit',
                                    amount: winAmt,
                                    desc: `Winnings: Match ${j.matchId}`,
                                    date: new Date().toISOString()
                                });
                            }
                        }
                        j.isComputed = true; // mark done
                        changesMade = true;
                    }
                }
            });

            if (changesMade) {
                localStorage.setItem('user_teams', JSON.stringify(teams));
                localStorage.setItem('joined_contests', JSON.stringify(joined));
                localStorage.setItem('users', JSON.stringify(users));
                localStorage.setItem('transactions', JSON.stringify(txList));
                
                let curUser = getCurrentUser();
                let updatedCurUser = users.find(u => u.id === curUser.id);
                localStorage.setItem('currentUser', JSON.stringify(updatedCurUser));
                
                alert("Simulation Complete! Matches finalised and Winnings deposited into wallets.");
                loadAdminData();
            } else {
                alert("Nothing to simulate. Ensure teams are created and contests are joined first.");
            }
        }

        loadAdminData();
    </script>
</body>
</html>
