<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Leaderboard | CricFantasy</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800;900&display=swap" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="styles/main.css">
    <style>
        .page-header {
            margin: 40px 0 20px 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            width: 40px; height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none;
            transition: background 0.3s ease;
        }
        .back-btn:hover { background: rgba(0, 242, 254, 0.2); }

        .leaderboard-header {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.9), rgba(15, 23, 42, 1));
            border: 1px solid rgba(0, 242, 254, 0.3);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .leaderboard-header::after {
            content: 'LIVE';
            position: absolute;
            top: 15px; right: 20px;
            background: #f43f5e;
            color: white;
            font-size: 0.7rem; font-weight: bold;
            padding: 2px 8px; border-radius: 12px;
            animation: pulse-red 2s infinite;
        }

        .lb-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            color: white;
            margin-bottom: 5px;
        }

        .lb-subtitle {
            color: var(--accent-primary);
            font-weight: 500;
        }

        .rank-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .rank-row {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 15px 20px;
            transition: transform 0.3s ease, background 0.3s ease;
        }

        .rank-row:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
        }
        
        .rank-row.is-user {
            background: rgba(0, 242, 254, 0.1);
            border-color: #00f2fe;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        .rank-number {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 1.5rem;
            width: 50px;
            color: var(--text-secondary);
        }

        .rank-1 .rank-number { color: #ffd700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        .rank-2 .rank-number { color: #c0c0c0; text-shadow: 0 0 10px rgba(192, 192, 192, 0.5); }
        .rank-3 .rank-number { color: #cd7f32; text-shadow: 0 0 10px rgba(205, 127, 50, 0.5); }

        .rank-user-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .lb-avatar {
            width: 45px; height: 45px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .rank-row.is-user .lb-avatar { border-color: #00f2fe; }

        .rank-points {
            font-family: 'Outfit', sans-serif;
            font-weight: bold;
            font-size: 1.2rem;
            color: #10b981;
        }

        .rank-prize {
            margin-left: 20px;
            font-weight: bold;
            color: #fbbf24;
            min-width: 80px;
            text-align: right;
        }

        .match-upcoming {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-secondary);
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="container animate-fade-in" style="max-width: 800px; padding-top: 20px;">
        <div class="page-header">
            <a href="my-contests.html" class="back-btn">←</a>
            <h1 style="font-family: 'Outfit', sans-serif;">Contest Leaderboard</h1>
        </div>

        <div class="leaderboard-header" id="lb-header" style="display:none;">
            <div class="lb-title" id="lb-contest-name">Mega Contest</div>
            <div class="lb-subtitle" id="lb-prize-pool">Prize Pool: ₹1.5 Crores</div>
        </div>

        <div id="leaderboard-container"></div>
    </div>

    <!-- Scripts -->
    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        requireAuth();
        renderNavbar(); // Injects the nav
        
        const urlParams = new URLSearchParams(window.location.search);
        const contestId = parseInt(urlParams.get('id'));
        if (!contestId) window.location.href = 'my-contests.html';

        const currentUser = getCurrentUser();
        const allContests = getContests();
        const allMatches = getMatches();
        const userTeams = getUserTeams();

        const contest = allContests.find(c => c.id === contestId);
        const match = allMatches.find(m => m.id === contest.matchId);
        const userTeam = userTeams.find(t => t.matchId === match.id && t.userId === currentUser.id);

        if(!contest || !match || !userTeam) {
            document.getElementById('leaderboard-container').innerHTML = `<div class="match-upcoming">Data not found or not joined.</div>`;
        } else {
            document.getElementById('lb-header').style.display = 'block';
            document.getElementById('lb-contest-name').innerText = contest.name;
            document.getElementById('lb-prize-pool').innerText = `Prize Pool: ${contest.prizePool}`;

            const isSimulated = userTeam.totalPoints && userTeam.totalPoints > 0;

            if(!isSimulated) {
                document.getElementById('leaderboard-container').innerHTML = `
                    <div class="match-upcoming">
                        <div style="font-size: 3rem; margin-bottom: 15px;">⏳</div>
                        <h3>Match has not been simulated yet!</h3>
                        <p style="margin-top: 10px;">Check back later or ask Admin to simulate match results.</p>
                    </div>
                `;
            } else {
                // Generate mocked opponents and insert user
                let participants = [
                    { name: currentUser.phone + " (You)", isUser: true, points: userTeam.totalPoints },
                    { name: "Rahul_Winner", isUser: false, points: userTeam.totalPoints + 45 },
                    { name: "Sneha_Pro", isUser: false, points: userTeam.totalPoints - 10 },
                    { name: "Amit123", isUser: false, points: userTeam.totalPoints + 20 },
                    { name: "PriyaFantasy", isUser: false, points: userTeam.totalPoints + 150 },
                    { name: "CricMaster", isUser: false, points: userTeam.totalPoints - 60 },
                    { name: "JohnDoe", isUser: false, points: userTeam.totalPoints + 5 },
                ];

                // Sort by points highest to lowest
                participants.sort((a,b) => b.points - a.points);

                const getPrizeAmt = (rank) => {
                    if(rank === 1) return `₹10,000`;
                    if(rank === 2) return `₹5,000`;
                    if(rank === 3) return `₹1,000`;
                    if(rank <= 5) return `₹500`;
                    return `-`;
                };

                const lbHTML = participants.map((p, index) => {
                    const rank = index + 1;
                    const prize = getPrizeAmt(rank);
                    let rowClass = "rank-row";
                    if(rank <= 3) rowClass += ` rank-${rank}`;
                    if(p.isUser) rowClass += ` is-user`;

                    // For standardizing avatars
                    let avatarSrc = p.isUser ? 
                        `https://ui-avatars.com/api/?name=U&background=00f2fe&color=000` :
                        `https://ui-avatars.com/api/?name=${p.name.charAt(0)}&background=random&color=fff`;

                    return `
                        <div class="${rowClass}">
                            <div class="rank-number">#${rank}</div>
                            <div class="rank-user-info">
                                <img src="${avatarSrc}" class="lb-avatar" />
                                <div>
                                    <div style="font-weight: 600; font-size: 1.1rem; color: ${p.isUser ? '#00f2fe' : 'white'};">${p.name}</div>
                                    <div style="font-size: 0.8rem; color: var(--text-secondary);">Team 1</div>
                                </div>
                            </div>
                            <div class="rank-points">${p.points} <span style="font-size:0.7rem; color: var(--text-secondary);">pts</span></div>
                            <div class="rank-prize">${prize}</div>
                        </div>
                    `;
                }).join('');

                const container = document.getElementById('leaderboard-container');
                container.innerHTML = `
                    <div style="display: flex; justify-content: space-between; padding: 0 20px 10px 20px; color: var(--text-secondary); font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px;">
                        <div>Team Name</div>
                        <div style="display: flex; gap: 40px; text-align:right;">
                            <span>Points</span>
                            <span>Prize</span>
                        </div>
                    </div>
                    <div class="rank-list">${lbHTML}</div>
                `;
            }
        }
    </script>
</body>
</html>
