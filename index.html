<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CricFantasy | Play Premium Fantasy Sports</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="styles/main.css">
    <style>
        .hero {
            min-height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        
        .hero-blob {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(0, 229, 255, 0.1) 0%, transparent 60%);
            top: -300px;
            right: -300px;
            border-radius: 50%;
            z-index: -1;
            animation: float 10s ease-in-out infinite;
        }

        .hero-blob-2 {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(112, 0, 255, 0.15) 0%, transparent 60%);
            bottom: -200px;
            left: -200px;
            border-radius: 50%;
            z-index: -1;
            animation: float 12s ease-in-out infinite reverse;
        }

        .auth-container {
            max-width: 400px;
            margin: 0 auto;
        }
        
        .hero-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }
        
        .hero-content h1 {
            font-size: 4rem;
            line-height: 1.1;
            margin-bottom: 24px;
        }
        
        .hero-content p {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        @media (max-width: 768px) {
            .hero-grid {
                grid-template-columns: 1fr;
                text-align: center;
                gap: 40px;
                padding-top: 40px;
            }
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="hero-blob"></div>
        <div class="hero-blob-2"></div>
        <div class="container hero-grid">
            <div class="hero-content animate-fade-in">
                <h1>Build Your <br><span class="text-gradient">Ultimate Team</span></h1>
                <p>Join the most premium college fantasy league. Draft players, join contests, and top the leaderboard!</p>
                <div style="display: flex; gap: 16px; margin-top: 20px;">
                    <div class="badge badge-upcoming">💳 Demo Wallet Included</div>
                    <div class="badge badge-upcoming">🏏 Realistic Mock Data</div>
                </div>
            </div>
            
            <div class="auth-container animate-fade-in" style="animation-delay: 0.2s;">
                <div class="glass-card">
                    <h2 style="margin-bottom: 8px;">Let's Play!</h2>
                    <p style="color: var(--text-secondary); margin-bottom: 24px; font-size: 0.9rem;">Enter mobile number to login/register.</p>
                    
                    <form id="auth-form">
                        <div class="form-group">
                            <label class="form-label">Mobile Number</label>
                            <input type="text" id="phone" class="form-control" placeholder="Enter 10-digit number" required>
                        </div>
                        
                        <div class="form-group" id="otp-group" style="display: none;">
                            <label class="form-label">Enter OTP <span style="color: var(--accent-primary);">(Use 1234)</span></label>
                            <input type="password" id="otp" class="form-control" placeholder="****">
                        </div>
                        
                        <div id="error-msg" style="color: var(--accent-danger); font-size: 0.85rem; margin-bottom: 16px;"></div>

                        <button type="button" id="btn-submit" class="btn btn-primary" style="width: 100%;">Get OTP</button>
                    </form>

                    <p style="text-align: center; margin-top: 20px; font-size: 0.8rem; color: var(--text-secondary);">
                        *Hint: Login with Phone <strong style="color:var(--accent-primary);">9999999999</strong> to access the hidden Admin Simulator.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Init logic
        requireGuest();
        renderNavbar(); // Shared navbar

        const btnSubmit = document.getElementById('btn-submit');
        const phoneInput = document.getElementById('phone');
        const otpGroup = document.getElementById('otp-group');
        const otpInput = document.getElementById('otp');
        const errorMsg = document.getElementById('error-msg');
        
        let step = 1;

        btnSubmit.addEventListener('click', () => {
            errorMsg.innerText = "";
            const phone = phoneInput.value.trim();
            
            if (phone.length < 10) {
                errorMsg.innerText = "Please enter a valid 10-digit number.";
                return;
            }

            if (step === 1) {
                // Show OTP field
                otpGroup.style.display = 'block';
                phoneInput.disabled = true;
                btnSubmit.innerText = "Verify & Login";
                step = 2;
            } else {
                // Verify OTP
                const otp = otpInput.value;
                const result = loginUser(phone, otp);
                
                if (result.success) {
                    window.location.href = 'dashboard.html';
                } else {
                    errorMsg.innerText = result.message;
                }
            }
        });
    </script>
</body>
</html>
