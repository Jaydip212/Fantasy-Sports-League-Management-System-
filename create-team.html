<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Team | CricFantasy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
    <style>
        .team-creation-bar {
            background: linear-gradient(90deg, rgba(30, 36, 56, 0.9), rgba(15, 18, 30, 0.95));
            backdrop-filter: blur(20px);
            padding: 20px 30px;
            border-radius: var(--radius-md);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            position: sticky;
            top: 90px;
            z-index: 10;
            border: 1px solid var(--border-glass);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6), 0 0 20px rgba(0, 229, 255, 0.1);
        }

        .stat-badge {
            text-align: center;
            position: relative;
        }

        .stat-badge span {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .stat-badge strong {
            font-size: 1.6rem;
            color: var(--text-primary);
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        .player-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: rgba(30, 36, 56, 0.4);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: var(--radius-sm);
            margin-bottom: 12px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .player-row:hover {
            background: rgba(255,255,255,0.08);
            transform: translateX(10px);
            border-color: rgba(255,255,255,0.2);
        }

        .player-row.selected {
            border-color: var(--accent-primary);
            background: linear-gradient(90deg, rgba(0, 229, 255, 0.1), rgba(0,0,0,0.4));
            box-shadow: inset 5px 0 0 var(--accent-primary);
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .role-badge {
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 6px;
            background: rgba(255,255,255,0.1);
            color: var(--text-secondary);
            font-weight: 800;
            text-transform: uppercase;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .action-area {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .add-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid var(--accent-primary);
            color: var(--accent-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 900;
            font-size: 1.4rem;
            transition: all 0.2s;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
        }

        .player-row.selected .add-btn {
            background: var(--accent-primary);
            color: #000;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.5);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--bg-secondary);
            width: 90%;
            max-width: 500px;
            border-radius: var(--radius-md);
            padding: 24px;
            border: 1px solid var(--border-glass);
        }

        .cvc-select {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
        }

        .cvc-btn {
            width: 36px; height: 36px;
            border-radius: 50%;
            border: 1px solid var(--border-glass);
            background: transparent;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .cvc-btn.c-active { background: var(--accent-warning); color: #000; border-color: var(--accent-warning); }
        .cvc-btn.vc-active { background: var(--accent-secondary); color: #000; border-color: var(--accent-secondary); }

        .role-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .role-tab {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
        }

        .role-tab.active {
            background: rgba(0, 229, 255, 0.1);
            color: var(--accent-primary);
            border-color: var(--accent-primary);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
        }
    </style>
</head>
<body>

    <div class="container" style="padding-top: 20px;">
        <h2 style="margin-bottom: 20px;">Select Players</h2>

        <div class="team-creation-bar">
            <div class="stat-badge">
                <span>Players</span>
                <strong><span id="p-count">0</span>/11</strong>
            </div>
            <div class="stat-badge">
                <span>Credits Left</span>
                <strong><span id="c-left">100</span></strong>
            </div>
            <button id="btn-next" class="btn btn-primary" onclick="showCVCModal()" disabled>Next</button>
        </div>

        <div class="role-tabs">
            <div class="role-tab active" onclick="setFilter('ALL')">ALL</div>
            <div class="role-tab" onclick="setFilter('WK')">WK</div>
            <div class="role-tab" onclick="setFilter('BAT')">BAT</div>
            <div class="role-tab" onclick="setFilter('AR')">AR</div>
            <div class="role-tab" onclick="setFilter('BOWL')">BOWL</div>
        </div>

        <div id="players-list"></div>
    </div>

    <!-- C/VC Selection Modal -->
    <div class="modal-overlay" id="cvc-modal">
        <div class="modal-content animate-fade-in">
            <h3 style="margin-bottom: 16px;">Choose Captain & Vice Captain</h3>
            <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 24px;">C gets 2x points, VC gets 1.5x points</p>
            
            <div id="cvc-list" style="max-height: 400px; overflow-y: auto; margin-bottom: 24px;"></div>
            
            <div style="display: flex; gap: 16px;">
                <button class="btn btn-outline" style="flex: 1;" onclick="closeCVCModal()">Back</button>
                <button class="btn btn-primary" style="flex: 1;" id="btn-save-team" onclick="saveTeam()" disabled>Save Team</button>
            </div>
        </div>
    </div>

    <!-- Player Info Modal (Dream11 Style) -->
    <div class="modal-overlay" id="player-info-modal" onclick="closePlayerInfo(event)" style="display:none; align-items:flex-end;">
        <div class="modal-content animate-fade-in" style="margin-bottom: 0px; border-radius: 20px 20px 0 0; box-shadow: 0 -10px 40px rgba(0,0,0,0.5);" onclick="event.stopPropagation()">
            <div style="display:flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px;">
                <div style="display:flex; align-items: center; gap: 15px;">
                    <img id="pi-img" src="" style="width: 70px; height: 70px; border-radius: 50%; border: 2px solid #00f2fe;">
                    <div>
                        <h3 id="pi-name" style="font-size: 1.5rem; margin-bottom: 4px;">Player Name</h3>
                        <div style="display:flex; gap:8px;">
                            <span id="pi-team" class="role-badge" style="background: rgba(255,255,255,0.1);">TEAM</span>
                            <span id="pi-role" class="role-badge" style="background: rgba(0,242,254,0.1); color: #00f2fe;">ROLE</span>
                        </div>
                    </div>
                </div>
                <button style="background:transparent; border:none; color:white; font-size:1.5rem; cursor:pointer;" onclick="document.getElementById('player-info-modal').style.display='none'">&times;</button>
            </div>

            <div style="display:flex; justify-content: space-between; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; margin-bottom: 20px;">
                <div style="text-align: center;">
                    <div style="color:var(--text-secondary); font-size: 0.8rem; margin-bottom: 4px;">Credits</div>
                    <div id="pi-credits" style="font-weight: bold; font-size: 1.2rem; color: var(--text-primary);">9.0</div>
                </div>
                <div style="text-align: center;">
                    <div style="color:var(--text-secondary); font-size: 0.8rem; margin-bottom: 4px;">Total Points</div>
                    <div id="pi-pts" style="font-weight: bold; font-size: 1.2rem; color: #10b981;">284</div>
                </div>
                <div style="text-align: center;">
                    <div style="color:var(--text-secondary); font-size: 0.8rem; margin-bottom: 4px;">Sel By</div>
                    <div id="pi-sel" style="font-weight: bold; font-size: 1.2rem; color: var(--text-primary);">85%</div>
                </div>
            </div>

            <div style="margin-bottom: 10px;">
                <h4 style="margin-bottom: 15px; color: var(--text-secondary);">Recent Form</h4>
                <div style="display:flex; justify-content: space-between; align-items: flex-end; height: 100px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">
                    <div style="width: 15%; background: var(--accent-primary); height: 40%; border-radius: 4px 4px 0 0; text-align: center; position: relative;">
                        <span style="position: absolute; top: -20px; left: 0; width: 100%; font-size: 0.75rem;">32</span>
                    </div>
                    <div style="width: 15%; background: var(--accent-primary); height: 80%; border-radius: 4px 4px 0 0; text-align: center; position: relative;">
                        <span style="position: absolute; top: -20px; left: 0; width: 100%; font-size: 0.75rem;">78</span>
                    </div>
                    <div style="width: 15%; background: #f43f5e; height: 10%; border-radius: 4px 4px 0 0; text-align: center; position: relative;">
                        <span style="position: absolute; top: -20px; left: 0; width: 100%; font-size: 0.75rem;">4</span>
                    </div>
                    <div style="width: 15%; background: var(--accent-primary); height: 50%; border-radius: 4px 4px 0 0; text-align: center; position: relative;">
                        <span style="position: absolute; top: -20px; left: 0; width: 100%; font-size: 0.75rem;">45</span>
                    </div>
                    <div style="width: 15%; background: var(--accent-primary); height: 100%; border-radius: 4px 4px 0 0; text-align: center; position: relative; box-shadow: 0 0 10px rgba(0,242,254,0.5);">
                        <span style="position: absolute; top: -20px; left: 0; width: 100%; font-size: 0.75rem; color:#00f2fe; font-weight:bold;">112</span>
                    </div>
                </div>
                <div style="text-align: center; color: var(--text-secondary); font-size: 0.75rem; margin-top: 10px;">Fantasy Points in Last 5 Matches</div>
            </div>
        </div>
    </div>

    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        requireAuth();
        
        const urlParams = new URLSearchParams(window.location.search);
        const matchId = parseInt(urlParams.get('id'));
        if (!matchId) window.location.href = 'dashboard.html';

        const allPlayers = getPlayers().filter(p => p.matchId === matchId);
        
        let selectedPlayers = [];
        let creditsLeft = 100.0;
        let cId = null;
        let vcId = null;

        const existingTeam = getUserTeams().find(t => t.matchId === matchId && t.userId === getCurrentUser().id);
        if (existingTeam) {
            selectedPlayers = [...existingTeam.playerIds];
            cId = existingTeam.captainId;
            vcId = existingTeam.viceCaptainId;
            const spent = allPlayers.filter(p => selectedPlayers.includes(p.id)).reduce((sum, p) => sum + p.credits, 0);
            creditsLeft = 100.0 - spent;
        }

        let currentFilter = 'ALL';

const bgColors = {
    'CSK': 'rgba(255, 204, 0, 0.2)', 'MI': 'rgba(0, 100, 255, 0.2)', 'RCB': 'rgba(255, 0, 0, 0.2)',
    'KKR': 'rgba(128, 0, 128, 0.2)', 'RR': 'rgba(255, 105, 180, 0.2)', 'SRH': 'rgba(255, 140, 0, 0.2)'
};
const txtColors = {
    'CSK': '#ffcc00', 'MI': '#6eb6ff', 'RCB': '#ff6666', 'KKR': '#ff66ff', 'RR': '#ffb3d9', 'SRH': '#ffb366'
};

function renderPlayers() {
    const list = document.getElementById('players-list');
    
    const filteredPlayers = allPlayers.filter(p => currentFilter === 'ALL' || p.role === currentFilter);
    
    list.innerHTML = filteredPlayers.map(p => {
        const isSelected = selectedPlayers.includes(p.id);
        const bg = bgColors[p.team] || 'rgba(255,255,255,0.2)';
        const col = txtColors[p.team] || '#fff';
        return `
        <div class="player-row ${isSelected ? 'selected' : ''}" onclick="togglePlayer(${p.id}, ${p.credits})">
            <div class="player-info">
                <div onclick="event.stopPropagation(); showPlayerInfo(${p.id})" style="cursor: pointer;">
                    <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(p.name)}&background=random&color=fff" alt="${p.name}" style="width: 45px; height: 45px; border-radius: 50%;">
                </div>
                <div>
                    <div style="font-weight: 600; cursor: pointer;" onclick="event.stopPropagation(); showPlayerInfo(${p.id})">${p.name}</div>
                    <div style="display: flex; gap: 8px; margin-top: 4px;">
                        <span class="role-badge" style="background: ${bg}; color: ${col}">${p.team}</span>
                        <span class="role-badge">${p.role}</span>
                    </div>
                </div>
            </div>
            <div class="action-area">
                <div style="text-align: right; color: var(--text-secondary); font-size: 0.85rem;">
                    Sel by 85%<br>
                    <span style="font-weight: bold; color: var(--text-primary);">${p.credits} CR</span>
                </div>
                <div class="add-btn">${isSelected ? '-' : '+'}</div>
            </div>
        </div>`;
    }).join('');
            
            document.getElementById('p-count').innerText = selectedPlayers.length;
            document.getElementById('c-left').innerText = creditsLeft.toFixed(1);
            
            document.getElementById('btn-next').disabled = selectedPlayers.length !== 11;
        }

        window.setFilter = function(role) {
            currentFilter = role;
            document.querySelectorAll('.role-tab').forEach(t => {
                if(t.innerText === role) t.classList.add('active');
                else t.classList.remove('active');
            });
            renderPlayers();
        }

        window.togglePlayer = function(id, credits) {
            const idx = selectedPlayers.indexOf(id);
            if (idx > -1) {
                selectedPlayers.splice(idx, 1);
                creditsLeft += credits;
            } else {
                if (selectedPlayers.length >= 11) {
                    alert("You can only select 11 players!");
                    return;
                }
                if (creditsLeft - credits < 0) {
                    alert("Not enough credits!");
                    return;
                }
                selectedPlayers.push(id);
                creditsLeft -= credits;
            }
            renderPlayers();
        }

        // C/VC Modal logic
        window.showCVCModal = function() {
            document.getElementById('cvc-modal').style.display = 'flex';
            renderCVCList();
        }

        window.closeCVCModal = function() {
            document.getElementById('cvc-modal').style.display = 'none';
        }

        function renderCVCList() {
            const cvcList = document.getElementById('cvc-list');
            const teamPlayers = allPlayers.filter(p => selectedPlayers.includes(p.id));
            
            cvcList.innerHTML = teamPlayers.map(p => `
                <div class="cvc-select">
                    <div style="font-weight: 600;">${p.name} <span class="role-badge">${p.role}</span></div>
                    <div style="display: flex; gap: 8px;">
                        <button class="cvc-btn ${cId === p.id ? 'c-active' : ''}" onclick="setC(${p.id})">C</button>
                        <button class="cvc-btn ${vcId === p.id ? 'vc-active' : ''}" onclick="setVC(${p.id})">VC</button>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('btn-save-team').disabled = !(cId && vcId);
        }

        window.setC = function(id) {
            if (vcId === id) vcId = null;
            cId = id;
            renderCVCList();
        }

        window.setVC = function(id) {
            if (cId === id) cId = null;
            vcId = id;
            renderCVCList();
        }

        window.saveTeam = function() {
            let teams = getUserTeams();
            
            // Check if user already has a team for this match (Demo limits to 1 team for simplicity)
            const existingTeamIdx = teams.findIndex(t => t.matchId === matchId && t.userId === getCurrentUser().id);
            
            const newTeam = {
                id: generateId(),
                userId: getCurrentUser().id,
                matchId: matchId,
                playerIds: selectedPlayers,
                captainId: cId,
                viceCaptainId: vcId,
                totalPoints: 0 // to be simulated later
            };

            if (existingTeamIdx > -1) {
                teams[existingTeamIdx] = newTeam; // Update
            } else {
                teams.push(newTeam); // Add
            }

            localStorage.setItem('user_teams', JSON.stringify(teams));
            alert("Team saved successfully!");
            window.location.href = `match.html?id=${matchId}`;
        }

        // initial render
        renderPlayers();

        window.showPlayerInfo = function(id) {
            const p = allPlayers.find(player => player.id === id);
            if(!p) return;
            
            document.getElementById('pi-name').innerText = p.name;
            document.getElementById('pi-team').innerText = p.team;
            document.getElementById('pi-role').innerText = p.role;
            document.getElementById('pi-img').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(p.name)}&background=random&color=fff`;
            
            document.getElementById('pi-credits').innerText = p.credits;
            
            // Generate some random points based on credits
            const fakePts = Math.floor(p.credits * 30 + Math.random() * 50);
            document.getElementById('pi-pts').innerText = fakePts;
            
            // Random Selection %
            const fakeSel = Math.floor(Math.random() * 60 + 20) + "%";
            document.getElementById('pi-sel').innerText = fakeSel;

            document.getElementById('player-info-modal').style.display = 'flex';
        }

        window.closePlayerInfo = function(e) {
            document.getElementById('player-info-modal').style.display = 'none';
        }
    </script>
</body>
</html>
